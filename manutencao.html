<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - New Member</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

    <header class="header scrolled">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="ti ti-accessible"></i></div>
                <span class="logo-text">New<strong>Member</strong></span>
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Início</a>
                <a href="tecnologia.html" class="nav-link">Tecnologia</a>
                <a href="planos.html" class="nav-link">Planos</a>
                <a href="manutencao.html" class="nav-link">Manutenção</a>
                <a href="suporte.html" class="nav-link">Suporte</a>
                <a href="perfil.html" class="nav-link active nav-link--profile"><i class="ti ti-user"></i> Perfil</a>
            </nav>
            <div class="header-actions">
                <button id="theme-toggle" class="theme-btn"><i class="ti ti-moon"></i></button>
            </div>
        </div>
    </header>

    <main class="features" style="padding-top: 140px;">
        <div class="features-inner">
            <span class="section-label">Área do Paciente</span>
            <h2 class="section-title">Dados cadastrais e conectividade</h2>
            
            <div class="features-grid" style="grid-template-columns: 1fr 360px; align-items: start;">
                
                <div class="feature-card" style="box-shadow: var(--shadow-card);">
                    <h3 class="feature-title"><i class="ti ti-id" style="color: var(--blue);"></i> Informações Pessoais</h3>
                    <div class="login-card-body" style="margin-top: 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="input-group">
                            <label class="input-label">Nome Completo</label>
                            <input type="text" class="input-field" style="padding-left: 1rem;" value="Alex Silva">
                        </div>
                        <div class="input-group">
                            <label class="input-label">E-mail cadastrado</label>
                            <input type="email" class="input-field" style="padding-left: 1rem;" value="alex@exemplo.com" disabled>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Telefone</label>
                            <input type="text" class="input-field" style="padding-left: 1rem;" placeholder="(00) 00000-0000">
                        </div>
                        <div class="input-group">
                            <label class="input-label">Número de Série da Prótese</label>
                            <input type="text" class="input-field" style="padding-left: 1rem;" value="#NX-55092" disabled>
                        </div>
                        <button class="btn btn--primary" style="grid-column: span 2; margin-top: .5rem;">Salvar Informações</button>
                    </div>
                </div>

                <div class="feature-card" style="text-align: center;">
                    <div class="feature-icon feature-icon--purple" style="margin: 0 auto;"><i class="ti ti-device-analytics"></i></div>
                    <h3 class="feature-title" style="margin-top: .5rem;">Status do Sistema</h3>
                    <p class="feature-desc">Dispositivo conectado via nuvem. Firmware atualizado na versão v2.4.2.</p>
                    <button class="btn btn--ghost" style="margin-top: 1rem;"><i class="ti ti-logout"></i> Encerrar Sessão</button>
                </div>

            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <span class="footer-copy">© 2026 NewMember. Todos os direitos reservados.</span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
